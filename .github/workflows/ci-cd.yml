name: CI-CD

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    validate-files:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Verify files exist
              run: |
                files=(Dockerfile index.html style.css texture.jpg nginx.conf)

                for file in "${files[@]}"; do
                  if [ ! -f "$file" ]; then
                    echo "$file not found!"
                    exit 1
                  fi
                done
            
            - name: Validate Nginx configuration
              run: |
                docker run --rm \
                -v "$PWD/nginx.conf:/etc/nginx/nginx.conf:ro" \
                nginx:latest \
                nginx -t


            - name: Build Docker image
              run: docker build -t atelier-ci-cd .

            - name: Run container
              run: docker run -d --name atelier-ci-cd-test -p 8080:80 atelier-ci-cd

            - name: SLEEP 5s
              run: |
                sleep 5

            - name: Verify site is up
              run: |
                if ! curl -fsS http://localhost:8080 >/dev/null; then
                  exit 1
                fi
                
            
            - name: Verify /health endpoint
              run: |
                if ! curl -fsS http://localhost:8080/health >/dev/null; then
                  exit 1
                fi

    publish:
        needs: validate-files
        runs-on: ubuntu-latest

        permissions:
          contents: read
          packages: write

        steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Login to GHCR
            uses: docker/login-action@v3
            with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

          - name: Set lowercase repository name
            run: |
              IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
              echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

          - name: Build image
            run: |
              docker build \
                -t ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                -t ghcr.io/${{ env.IMAGE_NAME }}:latest \
                .

          - name: Push image
            run: |
              docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
              docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
